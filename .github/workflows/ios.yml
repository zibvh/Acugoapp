name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS (simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Capacitor deps
        run: npm install

      - name: Inject production API URL
        env:
          BIXCART_API_URL: ${{ secrets.BIXCART_API_URL }}
        run: node scripts/inject-api-url.js

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install --repo-update

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build for simulator (unsigned)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty --color || true

      - name: Upload simulator build
        uses: actions/upload-artifact@v4
        with:
          name: bixcart-ios-sim-${{ github.sha }}
          path: ios/build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 7
          if-no-files-found: warn

